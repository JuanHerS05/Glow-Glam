# --- Base de datos ---
# En produccion (Railway) estas variables las inyecta el servicio MySQL.
# Los valores tras ":" son solo defaults para desarrollo local (docker-compose).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:13306/glowglam?serverTimezone=GMT-5}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:glowg}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:psjjaGg}

# --- Puerto ---
# Railway asigna el puerto via la variable PORT; en local usa 8080.
server.port=${PORT:8080}
